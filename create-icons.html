<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; display: flex; gap: 20px; padding: 20px; background: #faf8f5; }
</style>
</head>
<body>
<canvas id="icon16" width="16" height="16"></canvas>
<canvas id="icon48" width="48" height="48"></canvas>
<canvas id="icon128" width="128" height="128"></canvas>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  
  // Background
  ctx.fillStyle = '#2d5d4f';
  ctx.fillRect(0, 0, size, size);
  
  // Draw a stylized "P" for Prompt
  ctx.fillStyle = '#ffffff';
  const fontSize = size * 0.7;
  ctx.font = `bold ${fontSize}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('P', size/2, size/2);
}

drawIcon(document.getElementById('icon16'));
drawIcon(document.getElementById('icon48'));
drawIcon(document.getElementById('icon128'));

// Convert to images
setTimeout(() => {
  ['16', '48', '128'].forEach(s => {
    const canvas = document.getElementById('icon' + s);
    const link = document.createElement('a');
    link.download = `icon${s}.png`;
    link.href = canvas.toDataURL();
    link.click();
  });
}, 100);
</script>
</body>
</html>
